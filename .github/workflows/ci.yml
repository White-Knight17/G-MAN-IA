name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        working-directory: core
        run: go vet ./...

  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run Go tests
        working-directory: core
        run: go test ./... -v -cover -count=1

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build Go sidecar (needed by Tauri build script)
        run: make build-core
      - name: Run Rust tests
        working-directory: app/src-tauri
        run: cargo test

  test-frontend:
    name: Test (Svelte)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: app
        run: pnpm install
      - name: Run Svelte tests
        working-directory: app
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-go, test-rust, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend deps
        working-directory: app
        run: pnpm install
      - name: Build all
        run: make build
      - uses: actions/upload-artifact@v4
        with:
          name: gman-linux-x86_64
          path: app/src-tauri/target/release/bundle/
